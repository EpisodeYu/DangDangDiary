services:
  nginx:
    image: nginx:1.27-alpine
    container_name: dangdang-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - minio

  postgres:
    # Phase 2 Step 3 — uses the official pgvector image so the
    # `vector` extension is available for `pet_photo_embeddings`.
    # On an existing alpine data dir this is NOT an in-place upgrade:
    # run `docker compose down -v && up -d` on dev machines (prod
    # needs a dump/restore window).
    image: pgvector/pgvector:pg16
    container_name: dangdang-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dangdang
      POSTGRES_USER: ${DB_USER:-dangdang}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dangdang_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dangdang}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dangdang-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  minio:
    image: minio/minio:latest
    container_name: dangdang-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  postgres_data:
  redis_data:
  minio_data:
