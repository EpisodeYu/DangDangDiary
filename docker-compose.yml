services:
  fastapi:
    # 2026-05-26：后端从宿主机裸进程（nohup uvicorn）收进 compose。
    # 绑定挂载源码 + --reload，保留开发热重载：改代码即时生效，
    # 只有改 requirements.txt 才需要 `docker compose build fastapi`。
    build: ./backend
    container_name: dangdang-fastapi
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      # 仅绑回环：方便宿主机 curl localhost:8000 / SSH 隧道调试，
      # 对外访问仍只经 nginx（fastapi:8000，compose 网络内直连）。
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    container_name: dangdang-nginx
    restart: unless-stopped
    # 2026-05-26：80 端口由 ~/infra/ingress/ 统一接管。
    # 这里改为 expose（仅 docker network 内部可达），ingress-nginx attach
    # 到 dangdangdiary_default 网络后通过容器名 `dangdang-nginx:80` 直连。
    # 想绕过 ingress 测试时可临时改回 ports: ["80:80"]，但先确认 80 没被 ingress 占。
    expose:
      - "80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - minio
      - fastapi

  postgres:
    # Phase 2 Step 3 — uses the official pgvector image so the
    # `vector` extension is available for `pet_photo_embeddings`.
    # On an existing alpine data dir this is NOT an in-place upgrade:
    # run `docker compose down -v && up -d` on dev machines (prod
    # needs a dump/restore window).
    image: pgvector/pgvector:pg16
    container_name: dangdang-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dangdang
      POSTGRES_USER: ${DB_USER:-dangdang}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dangdang_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dangdang}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dangdang-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  minio:
    image: minio/minio:latest
    container_name: dangdang-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  postgres_data:
  redis_data:
  minio_data:
