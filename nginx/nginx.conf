events {}

http {
  # [DEBUG-2026-04-22] extended access log: the default combined format
  # doesn't tell us whether a slow request was spent on the phone->nginx
  # hop (request_time >> upstream_response_time) or inside FastAPI
  # (upstream_response_time high) or in the upload body (request_time
  # big but upstream_response_time tiny). `$body_bytes_sent` is the
  # response body length; `$request_length` is total bytes received
  # from the client including headers.
  log_format dbgtimed '$remote_addr - - [$time_local] "$request" '
                     '$status $body_bytes_sent req_len=$request_length '
                     'rt=$request_time uprt=$upstream_response_time '
                     'uct=$upstream_connect_time '
                     '"$http_user_agent"';
  access_log /var/log/nginx/access.log dbgtimed;

  server {
    listen 80;
    client_max_body_size 20m;

    location /api/ {
      proxy_pass http://host.docker.internal:8000/api/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 300s;
      proxy_send_timeout 300s;
    }

    location /docs {
      proxy_pass http://host.docker.internal:8000/docs;
      proxy_set_header Host $host;
    }

    location /openapi.json {
      proxy_pass http://host.docker.internal:8000/openapi.json;
      proxy_set_header Host $host;
    }

    location /media/ {
      proxy_pass http://minio:9000/;
      proxy_set_header Host 127.0.0.1:9000;
    }
  }
}
