name: dangdang_diary
description: "当当日记 - 宠物日记APP"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Routing
  go_router: ^14.0.0
  # State management
  flutter_riverpod: ^2.5.0
  # Networking
  dio: ^5.7.0
  # Local storage (token persistence)
  shared_preferences: ^2.3.0
  # Image picker
  image_picker: ^1.1.0
  # Needed to opt into Android 13+ Photo Picker (strictly enforces `limit`).
  image_picker_android: ^0.8.13
  image_picker_platform_interface: ^2.11.0
  # Image compression
  flutter_image_compress: ^2.3.0
  # EXIF reading
  exif: ^3.3.0
  # Image caching
  cached_network_image: ^3.4.0
  # Date formatting
  intl: ^0.19.0
  # Pull to refresh
  pull_to_refresh: ^2.0.0
  # Permission handling
  permission_handler: ^11.3.0
  # Photo viewer
  photo_view: ^0.15.0
  # Temp directory for HEIC conversion
  path_provider: ^2.1.0
  # Slide-to-action list items (used in health tabs)
  flutter_slidable: ^3.1.0
  # On-device pet (cat/dog) classification
  tflite_flutter: ^0.11.0
  image: ^4.3.0
  # Local notifications (step7: health reminders)
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  # Phase 2 Step 2: voice intake
  record: ^5.1.2
  uuid: ^4.4.0
  # Phase 2 Step 4: vector brand assets for Logo / Splash
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# `record: ^5.2` publishes a pubspec that pins record_linux to the
# old `>=0.5.0 <1.0.0` range, but the upstream repo has since moved
# record_platform_interface to 1.5.0 (adding a `request` arg to
# hasPermission and tweaking startStream). Pub resolves record_linux
# 0.7.2 from the old range, which fails to compile against 1.5.0 —
# even for Android / iOS builds, because dart kernel_snapshot still
# type-checks every plugin in the tree.
#
# Force record_linux to the version that matches the current
# interface. We never ship a Linux build; this is strictly a
# "make the Android tree type-check" override.
dependency_overrides:
  record_linux: ^1.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/brand/
